<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>Best Tea Bubble Tea Loyalty</title>
  <style>
:root{
  --bg:#0b0b12;
  --panel:#141427;
  --text:#f5f5ff;
  --muted:#b9b9d6;
  --line:#2b2b4d;
  --primary:#ff4fd8;
  --primary2:#ff77e4;
  --success:#45ff9a;
  --danger:#ff4b4b;
  --shadow: 0 10px 30px rgba(0,0,0,.35);
  --radius:18px;
}

*{box-sizing:border-box;tap-highlight-color:transparent}
body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  background: radial-gradient(1200px 600px at 20% 10%, rgba(255,79,216,.25), transparent 60%),
              radial-gradient(900px 500px at 90% 40%, rgba(69,255,154,.18), transparent 60%),
              var(--bg);
  color:var(--text);
  min-height:100vh;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 18px;
  border-bottom:1px solid rgba(255,255,255,.06);
  position:sticky;
  top:0;
  backdrop-filter: blur(10px);
  background: rgba(11,11,18,.65);
  z-index:10;
}

.brand .logo{font-weight:900;font-size:20px}
.brand .subtitle{color:var(--muted);font-size:12px;margin-top:2px}
.top-actions{display:flex;gap:10px;align-items:center}

.layout{
  display:grid;
  grid-template-columns: 380px 1fr;
  gap:14px;
  padding:14px;
}
@media (max-width: 980px){
  .layout{grid-template-columns: 1fr;}
}

.panel{
  background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.07);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow:hidden;
}

.panel-header{
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:space-between;
}
.panel-header h2{margin:0;font-size:16px}

.panel-footer{
  padding:12px 14px;
  border-top:1px solid rgba(255,255,255,.06);
}

.input, .textarea{
  width:100%;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
  background: rgba(20,20,39,.55);
  color:var(--text);
  outline:none;
  font-size:16px;
}
.input:focus, .textarea:focus{
  border-color: rgba(255,79,216,.45);
  box-shadow: 0 0 0 4px rgba(255,79,216,.12);
}
.textarea{min-height:110px;resize:vertical}

.list{
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
  max-height: calc(100vh - 210px);
  overflow:auto;
}

.item{
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.07);
  background: rgba(20,20,39,.45);
  cursor:pointer;
}
.item:hover{border-color: rgba(255,79,216,.35);}
.item.active{border-color: rgba(69,255,154,.45); background: rgba(69,255,154,.10);}
.item .row{display:flex;justify-content:space-between;gap:10px;align-items:center;}
.item .name{font-weight:800;}
.item .meta{color:var(--muted);font-size:12px;margin-top:3px}
.badge{
  font-size:12px;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  color:var(--muted);
}

.detail{padding:14px}
.grid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}
@media (max-width: 980px){
  .grid{grid-template-columns:1fr;}
}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.field span{color:var(--muted);font-size:12px;}

.stats{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:10px;
  margin:6px 0 12px;
}
@media (max-width: 980px){
  .stats{grid-template-columns: repeat(2, 1fr);}
}
.card{
  background: rgba(20,20,39,.55);
  border:1px solid rgba(255,255,255,.07);
  border-radius:16px;
  padding:12px 14px;
}
.card-title{color:var(--muted);font-size:12px;}
.card-value{font-size:20px;font-weight:900;margin-top:6px;}
.card-value.small{font-size:13px;font-weight:700;opacity:.95;}

.counter{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:8px 0 14px;}
.hint{color:var(--muted);font-size:12px;line-height:1.25}

.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}

.btn{
  border:none;
  border-radius:14px;
  padding:12px 16px;
  font-weight:900;
  cursor:pointer;
  color:var(--text);
  background: rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.10);
  font-size:16px;
  min-height:48px;
}
.btn.primary{background: linear-gradient(90deg, var(--primary), var(--primary2)); border:none;}
.btn.success{background: rgba(69,255,154,.18); border:1px solid rgba(69,255,154,.35);}
.btn.danger{background: rgba(255,75,75,.16); border:1px solid rgba(255,75,75,.35);}
.btn.ghost{background: rgba(255,255,255,.06);}
.btn.small{padding:8px 12px;font-size:14px;min-height:40px;}
.danger-outline{border:1px solid rgba(255,75,75,.45); background: rgba(255,255,255,.05);}

.pill{
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  color:var(--muted);
  border:1px solid rgba(255,255,255,.14);
  background: rgba(255,255,255,.03);
}

.modal-backdrop{
  position:fixed; inset:0;
  background: rgba(0,0,0,.55);
  z-index:50;
}
.modal{
  position:fixed;
  left:50%; top:50%;
  transform: translate(-50%,-50%);
  width:min(420px, 92vw);
  background: rgba(20,20,39,.95);
  border:1px solid rgba(255,255,255,.10);
  border-radius: 18px;
  box-shadow: var(--shadow);
  z-index:60;
  overflow:hidden;
}
.modal-header{
  padding:12px 14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.modal-header h3{margin:0;font-size:15px;}
.icon-btn{
  background: transparent;
  border:1px solid rgba(255,255,255,.16);
  color:var(--text);
  border-radius:12px;
  padding:8px 12px;
  cursor:pointer;
}
.modal-body{padding:14px;}
.modal-actions{
  padding:12px 14px;
  border-top:1px solid rgba(255,255,255,.08);
  display:flex;
  justify-content:flex-end;
  gap:10px;
}

.toast{
  position: fixed;
  right: 14px;
  bottom: 14px;
  width: min(420px, 92vw);
  background: rgba(20,20,39,.95);
  border: 1px solid rgba(255,255,255,.10);
  border-radius: 18px;
  box-shadow: var(--shadow);
  padding: 14px 16px;
  z-index: 80;
}
.toast-title{font-weight:900;font-size:15px;}
.toast-text{color:var(--muted);font-size:14px;margin:6px 0 10px;line-height:1.3;}

/* ANDROID 专属：文件选择器标准隐藏 */
#restoreFile {
  position: fixed;
  top: 0;
  left: 0;
  width: 0;
  height: 0;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
  </style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="logo">Best Tea Bubble Tea</div>
    <div class="subtitle">Loyalty Program</div>
  </div>

  <div class="top-actions">
    <button id="btnBackup" class="btn ghost small" type="button">Backup</button>
    <button id="btnRestore" class="btn ghost small" type="button">Restore</button>
    <input id="restoreFile" type="file" accept="application/json,.json" />
  </div>
</header>

<main class="layout">
  <section class="panel">
    <div class="panel-header">
      <h2>Customers</h2>
      <input id="search" class="input" placeholder="Search name / phone / email" />
    </div>
    <div class="list" id="customerList"></div>
    <div class="panel-footer">
      <button id="btnAddCustomer" class="btn primary" type="button">+ Add Customer</button>
    </div>
  </section>

  <section class="panel" id="detailPanel">
    <div class="panel-header">
      <h2>Customer Details</h2>
      <div class="pill" id="selectedBadge">None selected</div>
    </div>
    <div class="detail">
      <div class="grid">
        <label class="field"><span>Name</span><input id="name" class="input" /></label>
        <label class="field"><span>Phone</span><input id="phone" class="input" /></label>
        <label class="field"><span>Email</span><input id="email" class="input" /></label>
      </div>

      <div class="stats">
        <div class="card"><div class="card-title">Total Drinks</div><div class="card-value" id="totalDrinks">0</div></div>
        <div class="card"><div class="card-title">Batch (0–19)</div><div class="card-value" id="batchCount">0</div></div>
        <div class="card"><div class="card-title">Batches Completed</div><div class="card-value" id="batchesDone">0</div></div>
        <div class="card"><div class="card-title">Last Visit</div><div class="card-value small" id="lastVisit">—</div></div>
      </div>

      <div class="counter">
        <button id="btnMinus" class="btn danger" type="button">−</button>
        <button id="btnPlus" class="btn success" type="button">+</button>
        <div class="hint">Milestones: 5 free topping, 10 half price, 15 free topping, 20 free drink + plushie</div>
      </div>

      <label class="field"><span>Notes</span><textarea id="notes" class="textarea"></textarea></label>

      <div class="actions">
        <button id="btnSave" class="btn primary" type="button">Save</button>
        <button id="btnDelete" class="btn ghost danger-outline" type="button">Delete (PIN)</button>
      </div>
    </div>
  </section>
</main>

<!-- MODAL + TOAST -->
<div class="modal-backdrop" id="addModalBackdrop" hidden></div>
<div class="modal" id="addModal" hidden>
  <div class="modal-header"><h3>Add Customer</h3><button class="icon-btn" id="btnCloseAdd">✕</button></div>
  <div class="modal-body">
    <label class="field"><span>Name</span><input id="addName" class="input" /></label>
    <label class="field"><span>Phone</span><input id="addPhone" class="input" /></label>
    <label class="field"><span>Email</span><input id="addEmail" class="input" /></label>
  </div>
  <div class="modal-actions">
    <button class="btn ghost" id="btnCancelAdd">Cancel</button>
    <button class="btn primary" id="btnConfirmAdd">Create</button>
  </div>
</div>

<div class="toast" id="toast" hidden>
  <div class="toast-title" id="toastTitle"></div>
  <div class="toast-text" id="toastText"></div>
  <button class="btn ghost small" id="btnToastOk">OK</button>
</div>

<script>
const STORAGE_KEY = "bestea_loyalty_v2";
const SETTINGS_KEY = "bestea_settings_v2";
const DEFAULT_DELETE_PIN = "1234";

let state = { customers: [], selectedId: null, settings: { deletePin: DEFAULT_DELETE_PIN } };
const $ = id => document.getElementById(id);

// 工具函数
function uid() { return Math.random().toString(16).slice(2) + Date.now().toString(16); }
function safeNumber(n) { const x=Number(n);return Number.isFinite(x)?x:0; }
function computeBatch(total) { const t=Math.max(0,safeNumber(total));return {total:t,batchesDone:Math.floor(t/20),batchCount:t%20}; }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m])); }
function nowStamp() { return new Date().toLocaleString(); }

// 安卓优化版 Toast
function showToast(title, text) {
  const t=$("toast"),tt=$("toastTitle"),tx=$("toastText");
  if(!t||!tt||!tx){alert(`${title}\n${text}`);return;}
  tt.textContent=title;tx.textContent=text;t.hidden=false;
  setTimeout(hideToast,5000);
}
function hideToast() { $("toast").hidden=true; }

// 存储
function load() {
  try{state.customers=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch{state.customers=[];}
  try{state.settings={...state.settings,...JSON.parse(localStorage.getItem(SETTINGS_KEY))||{}};}catch{}
  state.customers=state.customers.map(c=>({id:c.id||uid(),name:c.name||"",phone:c.phone||"",email:c.email||"",notes:c.notes||"",totalDrinks:safeNumber(c.totalDrinks),lastVisit:c.lastVisit||""}));
}
function save() {
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state.customers));
  localStorage.setItem(SETTINGS_KEY,JSON.stringify(state.settings));
}

// 选中客户
function selected() { return state.customers.find(c=>c.id===state.selectedId)||null; }
function selectCustomer(id) { state.selectedId=id;renderList();renderDetail(); }

// 渲染
function renderList() {
  const list=$("customerList"),search=$("search");if(!list||!search)return;
  const q=(search.value||"").trim().toLowerCase();
  const filtered=state.customers.slice().sort((a,b)=>(b.lastVisit||"").localeCompare(a.lastVisit||"")).filter(c=>!q||(c.name||"").toLowerCase().includes(q)||(c.phone||"").toLowerCase().includes(q)||(c.email||"").toLowerCase().includes(q));
  list.innerHTML="";
  if(!filtered.length){list.innerHTML=`<div class="item" style="cursor:default"><div class="name">No customers</div><div class="meta">Tap Add Customer</div></div>`;return;}
  filtered.forEach(c=>{
    const {batchCount}=computeBatch(c.totalDrinks);
    const item=document.createElement("div");
    item.className="item"+(c.id===state.selectedId?" active":"");
    item.onclick=()=>selectCustomer(c.id);
    item.innerHTML=`<div class="row"><div class="name">${escapeHtml(c.name||"(No name)")}</div><div class="badge">${safeNumber(c.totalDrinks)} total</div></div><div class="meta">Batch: ${batchCount}/20 • ${escapeHtml(c.phone||c.email||"")}</div>`;
    list.appendChild(item);
  });
}

function renderDetail() {
  const c=selected();
  $("selectedBadge").textContent=c?"Selected":"None selected";
  ["name","phone","email","notes"].forEach(id=>{const el=$(id);el.disabled=!c;el.value=c?c[id]||"":"";});
  ["btnPlus","btnMinus","btnSave","btnDelete"].forEach(id=>$(id).disabled=!c);
  if(!c){$("totalDrinks").textContent="0";$("batchCount").textContent="0";$("batchesDone").textContent="0";$("lastVisit").textContent="—";return;}
  const {total,batchCount,batchesDone}=computeBatch(c.totalDrinks);
  $("totalDrinks").textContent=total;$("batchCount").textContent=batchCount;$("batchesDone").textContent=batchesDone;$("lastVisit").textContent=c.lastVisit||"—";
}

// 新增客户
function openAdd(open) { $("addModalBackdrop").hidden=!open;$("addModal").hidden=!open;if(open){$("addName").value=$("addPhone").value=$("addEmail").value="";$("addName").focus();}}
function addCustomer() {
  const name=$("addName").value.trim(),phone=$("addPhone").value.trim(),email=$("addEmail").value.trim();
  if(!name&&!phone&&!email){showToast("Missing Info","Enter name/phone/email");return;}
  const c={id:uid(),name,phone,email,notes:"",totalDrinks:0,lastVisit:""};
  state.customers.unshift(c);state.selectedId=c.id;save();openAdd(false);renderList();renderDetail();showToast("Success","Customer added");
}

// 编辑/删除
function saveEdits() {
  const c=selected();if(!c)return;
  c.name=$("name").value.trim();c.phone=$("phone").value.trim();c.email=$("email").value.trim();c.notes=$("notes").value.trim();
  save();renderList();renderDetail();showToast("Saved","Details updated");
}
function deleteCustomer() {
  const c=selected();if(!c)return;
  const pin=prompt("Enter PIN to delete:");if(pin===null)return;
  if(pin.trim()!==state.settings.deletePin){showToast("Error","Wrong PIN");return;}
  if(!confirm("Delete permanently?"))return;
  state.customers=state.customers.filter(x=>x.id!==c.id);
  state.selectedId=state.customers.length?state.customers[0].id:null;
  save();renderList();renderDetail();showToast("Deleted","Customer removed");
}

// 积分
function milestone(before,after){
  const bb=before%20,ab=after%20;
  if(bb===19&&ab===0)return{t:"20 Drinks! 🎉",m:"FREE DRINK + PLUSHIE"};
  if(ab===5)return{t:"5 Drinks",m:"Free Topping"};
  if(ab===10)return{t:"10 Drinks",m:"Half Price"};
  if(ab===15)return{t:"15 Drinks",m:"Free Topping"};
  return null;
}
function changeDrink(delta){
  const c=selected();if(!c)return;
  const before=Math.max(0,c.totalDrinks);
  const after=Math.max(0,before+delta);
  const ms=delta>0?milestone(before,after):null;
  c.totalDrinks=after;c.lastVisit=nowStamp();save();
  renderList();renderDetail();if(ms)showToast(ms.t,ms.m);
}

// ==============================================
// ANDROID 优化版：备份功能
// ==============================================
function backup() {
  const payload={app:"BestTeaAndroid",version:2,exportedAt:new Date().toISOString(),settings:state.settings,customers:state.customers};
  const json=JSON.stringify(payload,null,2);
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  
  // 安卓兼容：强制下载
  const a=document.createElement("a");
  a.href=url;
  a.download=`bestea-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.target="_blank"; // 安卓关键兼容
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
  
  showToast("Backup Saved","File downloaded to your Android Downloads folder ✅");
}

// ==============================================
// ANDROID 优化版：恢复功能
// ==============================================
function restoreFromFile(file) {
  if(!file){showToast("Error","No file selected");return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const text=e.target.result.trim();
      const data=JSON.parse(text);
      let customers=[];
      let settings=null;

      // 安卓兼容：宽松校验格式
      if(Array.isArray(data)) customers=data;
      else if(data?.customers) {customers=data.customers;settings=data.settings;}
      else throw new Error("Invalid backup");

      state.customers=customers.map(c=>({id:c.id||uid(),name:c.name||"",phone:c.phone||"",email:c.email||"",notes:c.notes||"",totalDrinks:safeNumber(c.totalDrinks),lastVisit:c.lastVisit||""}));
      if(settings) state.settings={...state.settings,...settings};
      
      state.selectedId=state.customers.length?state.customers[0].id:null;
      save();renderList();renderDetail();
      showToast("Restore Success",`Loaded ${state.customers.length} customers`);
    }catch(err){
      console.error(err);
      showToast("Restore Failed","Invalid JSON backup file");
    }
  };
  reader.readAsText(file);
}

// 事件绑定
function wire() {
  $("search").oninput=renderList;
  $("btnAddCustomer").onclick=()=>openAdd(true);
  $("btnCloseAdd").onclick=$("btnCancelAdd").onclick=$("addModalBackdrop").onclick=()=>openAdd(false);
  $("btnConfirmAdd").onclick=addCustomer;
  $("btnSave").onclick=saveEdits;$("btnDelete").onclick=deleteCustomer;
  $("btnPlus").onclick=()=>changeDrink(1);$("btnMinus").onclick=()=>changeDrink(-1);
  
  // 安卓备份/恢复
  $("btnBackup").onclick=backup;
  const restoreInput=$("restoreFile");
  $("btnRestore").onclick=()=>restoreInput.click();
  restoreInput.onchange=e=>{restoreFromFile(e.target.files[0]);e.target.value="";}; // 安卓：允许重复选择
  $("btnToastOk").onclick=hideToast;
}

// 初始化
document.addEventListener("DOMContentLoaded",()=>{load();if(state.customers.length)state.selectedId=state.customers[0].id;wire();renderList();renderDetail();});
</script>
</body>
</html>
